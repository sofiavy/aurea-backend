<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — AUREA</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23080806'/><text y='72' x='50' text-anchor='middle' font-size='62' font-family='serif' fill='%23C9A84C'>A</text></svg>" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-l:#E8D49A;--black:#080806;--dark:#0E0E0C;--dark2:#161614;--dark3:#1E1E1B;--gray:#888880;--gray2:#5A5A55;--light:#F2EDE4;--white:#FDFAF5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--light);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;}
.bg-glow{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;}
.bg-glow::before{content:'';position:absolute;top:20%;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(ellipse,rgba(201,168,76,.06),transparent 65%);border-radius:50%;}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;}
.logo-link{display:block;text-align:center;margin-bottom:2.5rem;text-decoration:none;}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;letter-spacing:.4em;color:var(--gold);}
.logo-sub{font-size:.6rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gray2);margin-top:.3rem;}
.card{background:var(--dark2);border:.5px solid rgba(201,168,76,.18);border-radius:10px;padding:2.5rem 2.2rem;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:var(--white);margin-bottom:.3rem;}
.card-sub{font-size:.76rem;color:var(--gray2);margin-bottom:2rem;}
.field{margin-bottom:1.3rem;}
label{display:block;font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gray2);margin-bottom:.5rem;}
input{width:100%;background:var(--dark3);border:.5px solid rgba(201,168,76,.18);color:var(--light);font-family:'DM Sans',sans-serif;font-size:.88rem;padding:.75rem 1rem;border-radius:4px;outline:none;transition:border-color .25s;}
input:focus{border-color:rgba(201,168,76,.55);}
input::placeholder{color:var(--gray2);opacity:.7;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:2.8rem;}
.pw-toggle{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray2);cursor:pointer;font-size:.85rem;padding:.2rem;transition:color .2s;}
.pw-toggle:hover{color:var(--gold);}

/* Strength bar */
.strength-bar{height:3px;background:var(--dark3);border-radius:2px;margin-top:.5rem;overflow:hidden;}
.strength-fill{height:100%;width:0%;border-radius:2px;transition:width .3s,background .3s;}
.strength-lbl{font-size:.6rem;color:var(--gray2);margin-top:.3rem;height:14px;}

.btn-submit{width:100%;background:var(--gold);color:var(--black);border:none;padding:.9rem;font-family:'DM Sans',sans-serif;font-size:.76rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;border-radius:4px;transition:all .3s;margin-top:.5rem;position:relative;overflow:hidden;}
.btn-submit::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:rgba(255,255,255,.15);transition:left .35s;}
.btn-submit:hover:not(:disabled)::before{left:100%;}
.btn-submit:hover:not(:disabled){background:var(--gold-l);transform:translateY(-1px);}
.btn-submit:disabled{opacity:.55;cursor:not-allowed;transform:none;}
.alert{padding:.75rem 1rem;border-radius:4px;font-size:.78rem;margin-bottom:1rem;display:none;}
.alert.error{background:rgba(192,57,43,.12);border:.5px solid rgba(192,57,43,.35);color:#E8927A;}
.alert.success{background:rgba(74,140,92,.1);border:.5px solid rgba(74,140,92,.35);color:#6BBF87;}
.alert.show{display:block;}
.links{text-align:center;margin-top:1.5rem;font-size:.75rem;color:var(--gray2);}
.links a{color:var(--gold);text-decoration:none;transition:opacity .2s;}
.links a:hover{opacity:.75;}
.divider{display:flex;align-items:center;gap:.8rem;margin:1.5rem 0;color:var(--gray2);font-size:.7rem;}
.divider::before,.divider::after{content:'';flex:1;height:.5px;background:rgba(201,168,76,.12);}
.back-link{display:flex;align-items:center;gap:.4rem;text-decoration:none;color:var(--gray2);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;margin-top:1.5rem;justify-content:center;transition:color .2s;}
.back-link:hover{color:var(--gold);}
.back-link svg{width:12px;height:12px;}
.benefits{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.8rem;padding:.9rem 1rem;background:rgba(201,168,76,.04);border:.5px solid rgba(201,168,76,.1);border-radius:6px;}
.benefit{font-size:.73rem;color:var(--gray);display:flex;align-items:center;gap:.55rem;}
.benefit::before{content:'◆';font-size:.45rem;color:var(--gold);flex-shrink:0;}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="wrap">
  <a href="/" class="logo-link">
    <div class="logo-text">AUREA</div>
    <div class="logo-sub">Pulseras Personalizadas</div>
  </a>

  <div class="card">
    <h1 class="card-title">Crear cuenta</h1>
    <p class="card-sub">Regístrate y guarda el historial de tus compras</p>

    <div class="benefits">
      <div class="benefit">Historial de pedidos guardado</div>
      <div class="benefit">Seguimiento fácil de tus pulseras</div>
      <div class="benefit">Proceso de compra más rápido</div>
    </div>

    <div id="alert" class="alert"></div>

    <form id="reg-form" novalidate>
      <div class="field">
        <label for="name">Nombre completo</label>
        <input type="text" id="name" placeholder="Tu nombre" autocomplete="name" required>
      </div>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required oninput="checkStrength(this.value)">
          <button type="button" class="pw-toggle" onclick="togglePw('password')" title="Ver">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-lbl" id="strength-lbl"></div>
      </div>
      <div class="field">
        <label for="password2">Confirmar contraseña</label>
        <div class="pw-wrap">
          <input type="password" id="password2" placeholder="Repite tu contraseña" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('password2')" title="Ver">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">Crear cuenta</button>
    </form>

    <div class="divider">o</div>

    <div class="links">
      ¿Ya tienes cuenta? <a href="/login">Iniciar sesión</a>
    </div>
  </div>

  <a href="/" class="back-link">
    <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2L4 6l4 4"/></svg>
    Volver a la tienda
  </a>
</div>

<script>
const API = 'https://aurea-backend-production-d168.up.railway.app/api';

function togglePw(id) {
  var inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showAlert(msg, type) {
  var el = document.getElementById('alert');
  el.textContent = msg;
  el.className = 'alert ' + type + ' show';
}
function hideAlert() { document.getElementById('alert').className = 'alert'; }

function checkStrength(val) {
  var fill = document.getElementById('strength-fill');
  var lbl  = document.getElementById('strength-lbl');
  var score = 0;
  if (val.length >= 6)  score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  var configs = [
    { w: '0%',   bg: 'transparent', lbl: '' },
    { w: '25%',  bg: '#C0392B',     lbl: 'Muy débil' },
    { w: '50%',  bg: '#E8927A',     lbl: 'Débil' },
    { w: '70%',  bg: '#C9A84C',     lbl: 'Aceptable' },
    { w: '85%',  bg: '#6BBF87',     lbl: 'Buena' },
    { w: '100%', bg: '#4A8C5C',     lbl: 'Excelente' },
  ];
  var c = configs[Math.min(score, 5)];
  fill.style.width = c.w;
  fill.style.background = c.bg;
  lbl.textContent = c.lbl;
  lbl.style.color = c.bg;
}

// Redirigir si ya está logueado
if (localStorage.getItem('aurea_token')) {
  window.location.href = '/';
}

document.getElementById('reg-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  hideAlert();

  var name     = document.getElementById('name').value.trim();
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var password2 = document.getElementById('password2').value;
  var btn      = document.getElementById('submit-btn');

  if (!name || !email || !password || !password2) {
    showAlert('Por favor completa todos los campos.', 'error');
    return;
  }
  if (password !== password2) {
    showAlert('Las contraseñas no coinciden.', 'error');
    return;
  }
  if (password.length < 6) {
    showAlert('La contraseña debe tener al menos 6 caracteres.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creando cuenta…';

  try {
    var res  = await fetch(API + '/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    var data = await res.json();

    if (!res.ok) {
      showAlert(data.error || 'Error al crear la cuenta.', 'error');
      btn.disabled = false;
      btn.textContent = 'Crear cuenta';
      return;
    }

    showAlert('✓ ¡Cuenta creada! Redirigiendo…', 'success');
    // Guardar sesión automáticamente
    localStorage.setItem('aurea_token', data.token);
    localStorage.setItem('aurea_user', JSON.stringify(data.user));
    setTimeout(() => { window.location.href = '/'; }, 1000);

  } catch (err) {
    showAlert('No se pudo conectar con el servidor. ¿Está corriendo en localhost:3000?', 'error');
    btn.disabled = false;
    btn.textContent = 'Crear cuenta';
  }
});
</script>
</body>
</html>
